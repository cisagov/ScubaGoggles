version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/scubagoggles/Testing/Functional/SmokeTests"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"