version: 2

updates:
  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  # Python dependencies
  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/Testing/Functional/SmokeTests"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"