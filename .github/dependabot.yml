version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        group-by: dependency-name
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/scubagoggles/Testing/Functional/SmokeTests"
    schedule:
      interval: "weekly"
    versioning-strategy: "increase-if-necessary"
    groups:
      python-dependencies:
        group-by: dependency-name
        patterns:
          - "*"