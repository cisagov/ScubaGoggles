# Purpose: Build and draft a GitHub release with categorized release notes

name: Build Draft Release

on:
  workflow_dispatch:
    inputs:
      # checkov:skip=CKV_GHA_7:Manual inputs are desired.
      releaseName:
        description: "Release Name (e.g., 1.0.0)"
        required: true
        type: string
      # Note: This should match __version__ in scubagoggles/__init__.py.
      version:
        description: "Release Version (e.g., 1.0.0)"
        required: true
        type: string
      compareHeadRef:
        description: "Compare head ref (branch or tag) for release notes, e.g. main or release/1.0.0. Defaults to the branch selected when running the workflow."
        required: false
        type: string
        default: ""

permissions: read-all

jobs:
  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: tcort/github-action-markdown-link-check@v1
        with:
          base-branch: "main"
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"

  build-and-deploy:
    needs: markdown-link-check
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.12"
      RELEASE_VERSION: ${{ inputs.version }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Package Repo for release
        shell: bash
        run: |
          reqv="${{ inputs.version }}"
          reqv="${reqv//[[:space:]]/}"
          [[ ! "$reqv" =~ ^[0-9]{1,2}(\.[0-9]{1,2}){2}$ ]] \
            && echo "invalid request version: $reqv" && exit 1
          sgv=$(grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+' scubagoggles/__init__.py)
          [[ "$reqv" == "$sgv" ]] \
            || (echo "version mismatch - current: $sgv" && exit 1)
          ./scubagoggles/utils/build.sh -r "$PWD" -t "$GITHUB_REF_NAME"

      - name: Get previous release tag
        id: previous-release
        uses: actions/github-script@v8
        with:
          script: |
            function parseVersion(tagName) {
              const match = tagName.match(/^v?(\d+)\.(\d+)(?:\.(\d+))?$/i);
              if (!match) {
                return null;
              }

              return {
                tag: tagName,
                parts: [
                  Number(match[1]),
                  Number(match[2]),
                  Number(match[3] ?? 0)
                ]
              };
            }

            function compareVersions(left, right) {
              for (let index = 0; index < 3; index++) {
                if (left.parts[index] !== right.parts[index]) {
                  return left.parts[index] - right.parts[index];
                }
              }
              return 0;
            }

            const releases = await github.paginate(
              github.rest.repos.listReleases,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              }
            );

            const currentTag = `v${{ inputs.version }}`;
            const currentVersion = parseVersion(currentTag);
            if (!currentVersion) {
              core.setFailed(`Unable to parse release version from tag ${currentTag}.`);
              return;
            }

            const publishedReleases = releases
              .filter(
                (release) =>
                  !release.draft &&
                  !release.prerelease &&
                  release.tag_name.toLowerCase() !== currentTag.toLowerCase()
              )
              .map((release) => ({
                release,
                version: parseVersion(release.tag_name)
              }))
              .filter((entry) => entry.version)
              .filter((entry) => compareVersions(entry.version, currentVersion) < 0)
              .sort((left, right) => compareVersions(right.version, left.version));

            const previousEntry = publishedReleases[0];
            if (!previousEntry) {
              core.setFailed(
                `Unable to find a published release older than ${currentTag}.`
              );
              return;
            }

            const previousRelease = previousEntry.release;
            core.info(
              `Using previous tag ${previousRelease.tag_name} (published ${previousRelease.published_at}) for release notes.`
            );
            core.setOutput("tag", previousRelease.tag_name);

      - name: Generate release notes
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const excludedLabels = new Set([
              "epic",
              "testing",
              "hands-on-prototyping",
              "blocked",
              "duplicate",
              "wontfix"
            ]);
            const sectionOrder = [
              "Major Changes",
              "Bugs Fixed",
              "Baselines",
              "Documentation",
              "Dependencies"
            ];

            function isDependencyPullRequest(pr) {
              const dependencyAuthors = new Set([
                "github-actions[bot]",
                "dependabot[bot]"
              ]);
              return (
                dependencyAuthors.has(pr.user.login) ||
                /^Bump /i.test(pr.title)
              );
            }

            function sectionFromLabelNames(names) {
              if (names.some((name) => excludedLabels.has(name))) {
                return null;
              }
              if (names.includes("baseline-document")) {
                return "Baselines";
              }
              if (names.includes("documentation")) {
                return "Documentation";
              }
              if (names.includes("bug")) {
                return "Bugs Fixed";
              }
              if (names.includes("enhancement")) {
                return "Major Changes";
              }
              return null;
            }

            async function getClosingIssueLabelNames(prNumber) {
              const query = `
                query ($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      closingIssuesReferences(first: 20) {
                        nodes {
                          number
                          labels(first: 20) {
                            nodes { name }
                          }
                        }
                      }
                    }
                  }
                }
              `;
              const result = await github.graphql(query, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                number: prNumber
              });
              const issues =
                result.repository.pullRequest.closingIssuesReferences.nodes;
              const names = new Set();
              for (const issue of issues) {
                for (const label of issue.labels.nodes) {
                  names.add(label.name);
                }
              }
              return {
                issueNumbers: issues.map((issue) => issue.number),
                labelNames: [...names]
              };
            }

            async function categorize(pr) {
              if (isDependencyPullRequest(pr)) {
                return "Dependencies";
              }

              const { issueNumbers, labelNames } =
                await getClosingIssueLabelNames(pr.number);
              if (issueNumbers.length === 0) {
                core.warning(
                  `PR #${pr.number} has no linked closing issues; skipping categorization.`
                );
                return null;
              }

              const section = sectionFromLabelNames(labelNames);
              if (!section) {
                core.warning(
                  `PR #${pr.number} closing issues (${issueNumbers.join(", ")}) ` +
                    `have no categorizing labels (${labelNames.join(", ") || "none"}); skipping.`
                );
                return null;
              }

              return section;
            }

            function formatPullRequest(pr) {
              return `* ${pr.title} by @${pr.user.login} in #${pr.number}`;
            }

            function buildIssuesUrl(query) {
              return (
                `https://github.com/${context.repo.owner}/${context.repo.repo}/issues?q=` +
                encodeURIComponent(query)
              );
            }

            const sectionFooters = {
              "Major Changes": {
                linkLabel: "enhancements",
                query:
                  "is:issue is:closed label:enhancement -label:baseline-document -label:documentation -label:testing -label:hands-on-prototyping -label:epic"
              },
              "Bugs Fixed": {
                linkLabel: "bug fixes",
                query:
                  "is:issue is:closed label:bug -label:baseline-document -label:testing -label:documentation -label:epic"
              },
              Documentation: {
                linkLabel: "documentation updates",
                query: "state:closed label:documentation"
              }
            };

            function formatSection(title, items) {
              const lines = [`## ${title}`, "", ...items];
              const footer = sectionFooters[title];
              if (footer) {
                lines.push(
                  `* See full list of ${footer.linkLabel} [here](${buildIssuesUrl(footer.query)})`
                );
              }
              return `${lines.join("\r\n")}\r\n`;
            }

            const bodConfigurationsUrl =
              "https://www.cisa.gov/resources-tools/services/bod-25-01-implementing-secure-practices-cloud-services-required-configurations";

            function formatBaselinesSection(baselineItems) {
              const baselineIssuesUrl = buildIssuesUrl(
                "is:issue is:closed label:baseline-document -label:testing -label:documentation -label:epic"
              );

              const lines = [
                "## Baselines",
                "",
                "### BOD 25-01 required configuration policy changes",
                "",
                "This section lists baseline policy changes that affect current " +
                  `[BOD 25-01 Required Configurations](${bodConfigurationsUrl}).`,
                "",
                "#### Additions",
                "",
                "No new required configuration policies added in this release.",
                "",
                "#### Removals",
                "",
                "_Move BOD 25-01 policy removals here before publishing._",
                "",
                "#### Updates",
                "",
                "_Move BOD 25-01 policy version updates here before publishing._",
                "",
                "### Other baseline changes",
                ""
              ];

              if (baselineItems.length > 0) {
                lines.push(...baselineItems);
              } else {
                lines.push("No baseline updates included in this release.");
              }

              lines.push(
                `* See full list of baseline updates [here](${baselineIssuesUrl})`
              );

              return `${lines.join("\r\n")}\r\n`;
            }

            function formatDependenciesSection(items) {
              const dependencyIssuesUrl = buildIssuesUrl(
                "is:pr is:merged (author:app/github-actions OR author:dependabot) sort:updated-desc"
              );
              const lines = ["## Dependencies", ""];
              if (items.length > 0) {
                lines.push(...items);
              } else {
                lines.push("No dependency updates included in this release.");
              }
              lines.push(
                `* See full list of dependency updates [here](${dependencyIssuesUrl})`
              );
              return `${lines.join("\r\n")}\r\n`;
            }

            async function resolveTagCommitSha(tagName) {
              const { data: ref } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tagName}`
              });

              if (ref.object.type === "commit") {
                return ref.object.sha;
              }

              const { data: tag } = await github.rest.git.getTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_sha: ref.object.sha
              });

              return tag.object.sha;
            }

            async function resolveCompareHeadRef(currentTag, compareHeadRefInput) {
              if (compareHeadRefInput) {
                return compareHeadRefInput;
              }

              try {
                await resolveTagCommitSha(currentTag);
                core.info(
                  `Tag ${currentTag} already exists; using it as the compare head for release notes.`
                );
                return currentTag;
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }

              core.info(
                `Tag ${currentTag} does not exist yet (expected before publish). ` +
                  `Using branch ${context.ref_name} as the compare head.`
              );
              return context.ref_name;
            }

            async function listMergedPullRequests(previousTag, currentTag, compareHeadRefInput) {
              const headRef = await resolveCompareHeadRef(
                currentTag,
                compareHeadRefInput
              );
              const basehead = `${previousTag}...${headRef}`;
              const pullRequestsByNumber = new Map();

              const { data: comparison } =
                await github.rest.repos.compareCommitsWithBasehead({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  basehead
                });

              core.info(
                `Comparing ${basehead}: ${comparison.commits.length} commits (status: ${comparison.status}).`
              );

              for (const commit of comparison.commits) {
                const { data: pulls } =
                  await github.rest.repos.listPullRequestsAssociatedWithCommit({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    commit_sha: commit.sha
                  });

                for (const pr of pulls) {
                  if (pr.merged_at) {
                    pullRequestsByNumber.set(pr.number, pr);
                  }
                }
              }

              core.info(
                `Found ${pullRequestsByNumber.size} pull requests associated with commits in ${basehead}.`
              );

              return { pullRequestsByNumber, headRef, basehead };
            }

            const tagName = `v${{ inputs.version }}`;
            const previousTag = "${{ steps.previous-release.outputs.tag }}";
            const compareHeadRefInput = "${{ inputs.compareHeadRef }}".trim();
            const { pullRequestsByNumber, headRef, basehead } =
              await listMergedPullRequests(
                previousTag,
                tagName,
                compareHeadRefInput
              );
            const grouped = Object.fromEntries(
              sectionOrder.map((title) => [title, []])
            );

            let categorizedCount = 0;
            let skippedCount = 0;
            for (const pr of pullRequestsByNumber.values()) {
              const section = await categorize(pr);
              if (section) {
                grouped[section].push(formatPullRequest(pr));
                categorizedCount += 1;
              } else if (!isDependencyPullRequest(pr)) {
                skippedCount += 1;
              }
            }

            const sections = sectionOrder
              .filter(
                (title) =>
                  title === "Baselines" ||
                  title === "Dependencies" ||
                  grouped[title].length > 0
              )
              .map((title) => {
                if (title === "Baselines") {
                  return formatBaselinesSection(grouped.Baselines);
                }
                if (title === "Dependencies") {
                  return formatDependenciesSection(grouped.Dependencies);
                }
                return formatSection(title, grouped[title]);
              });

            const compareUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/compare/${basehead}`;
            const body = `${sections.join("\r\n")}\r\n**Full Changelog**: ${compareUrl}\r\n`;

            fs.writeFileSync(path.join(process.cwd(), "release-body.md"), body, "utf8");

            const dependencyCount = grouped.Dependencies.length;
            core.info(
              `Release notes include ${categorizedCount} categorized pull requests ` +
                `(${dependencyCount} in Dependencies); skipped ${skippedCount} without usable issue labels.`
            );
            if (dependencyCount === 0) {
              core.warning(
                `No dependency pull requests were linked to commits in ${basehead}. ` +
                  "Cherry-picked changes may need to be added manually."
              );
            }

      - name: Show release notes
        run: |
          echo "::group::Generated release notes"
          cat release-body.md
          echo "::endgroup::"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        id: create_release
        with:
          draft: true
          prerelease: false
          name: v${{ inputs.releaseName }}
          tag_name: v${{ inputs.version }}
          body_path: release-body.md
          files: |
            scubagoggles-*-py3-none-any.whl
            scubagoggles-*.tar.gz
            scubagoggles-*.zip
          fail_on_unmatched_files: true
