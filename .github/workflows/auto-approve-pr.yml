# Purpose: Approve a pull request. The token identity must differ from the
# PR author for the approval to count toward branch protection.

name: Auto-approve PR

on:
  workflow_call:
    inputs:
      pr-url:
        description: "URL of the PR to approve"
        required: true
        type: string
    secrets:
      client_id:
        description: "Client ID for the auto-reviewer GitHub App"
        required: true
      private_key:
        description: "Private key for the auto-reviewer GitHub App"
        required: true

permissions:
  pull-requests: write

jobs:
  approve:
    name: Approve PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Generate auto-reviewer token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.client_id }}
          private-key: ${{ secrets.private_key }}

      - name: Check auto-reviewer app's repo permissions
        id: perm-check
        run: |
          echo "Checking effective repo permissions for the auto-reviewer app token..."
          PERMS=$(gh api "repos/${{ github.repository }}" --jq '.permissions')
          echo "Raw permissions object: $PERMS"

          PUSH=$(echo "$PERMS" | jq -r '.push')
          ADMIN=$(echo "$PERMS" | jq -r '.admin')

          echo "push=$PUSH"
          echo "admin=$ADMIN"

          if [ "$PUSH" != "true" ] && [ "$ADMIN" != "true" ]; then
            echo "::error::Auto-reviewer app token does NOT have write-level access to this repo (push=$PUSH, admin=$ADMIN)."
            echo "::error::This means the app's approval will NOT count toward required reviews."
            echo "::error::Fix: grant the GitHub App 'Contents: Read and write' permission (in addition to Pull requests), then have an org admin approve the updated permission request."
            exit 1
          fi

          echo "Auto-reviewer app has write-level repo access. Approval should count."
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Approve PR
        id: approve
        run: gh pr review --approve "${{ inputs.pr-url }}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Verify approval counted toward required reviews
        run: |
          PR_NUMBER=$(basename "${{ inputs.pr-url }}")
          OWNER=$(echo "${{ github.repository }}" | cut -d/ -f1)
          REPO=$(echo "${{ github.repository }}" | cut -d/ -f2)

          echo "Checking review decision for PR #$PR_NUMBER..."

          DECISION=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $number: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $number) {
                  reviewDecision
                  reviews(last: 5) {
                    nodes {
                      author { login }
                      state
                      authorAssociation
                    }
                  }
                }
              }
            }' -f owner="$OWNER" -f repo="$REPO" -F number="$PR_NUMBER" \
            --jq '.data.repository.pullRequest.reviewDecision')

          echo "Current reviewDecision: $DECISION"

          gh api graphql -f query='
            query($owner: String!, $repo: String!, $number: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $number) {
                  reviews(last: 5) {
                    nodes {
                      author { login }
                      state
                      authorAssociation
                    }
                  }
                }
              }
            }' -f owner="$OWNER" -f repo="$REPO" -F number="$PR_NUMBER" \
            --jq '.data.repository.pullRequest.reviews.nodes[]'

          if [ "$DECISION" == "REVIEW_REQUIRED" ]; then
            echo "::error::Approval was submitted but reviewDecision is still REVIEW_REQUIRED."
            echo "::error::The bot's review is not counting toward branch protection — likely a permissions issue on the GitHub App (see previous step)."
            exit 1
          fi

          echo "Review is counting correctly (reviewDecision=$DECISION)."
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}